<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient: matching the app's theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#764ba2" />
      <stop offset="100%" stop-color="#667eea" />
    </linearGradient>

    <!-- Left Bracket (HTML Orange) Gradient -->
    <linearGradient id="htmlOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f06529" />
      <stop offset="100%" stop-color="#e34f26" />
    </linearGradient>

    <!-- Right Bracket (CSS Blue) Gradient -->
    <linearGradient id="cssBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2965f1" />
      <stop offset="100%" stop-color="#264de4" />
    </linearGradient>

    <!-- Center Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>

    <!-- Glow Effect Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />

  <!-- Subtle Premium Highlight Border -->
  <rect x="12" y="12" width="488" height="488" rx="108" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6" />

  <!-- Left Angular Bracket: < -->
  <path d="M175 160 L95 256 L175 352" 
        fill="none" 
        stroke="url(#htmlOrange)" 
        stroke-width="36" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neonGlow)" />

  <!-- Right Angular Bracket: > -->
  <path d="M337 160 L417 256 L337 352" 
        fill="none" 
        stroke="url(#cssBlue)" 
        stroke-width="36" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#neonGlow)" />

  <!-- Center Question Mark Symbol: ? -->
  <g filter="url(#neonGlow)">
    <path d="M256 160 C290 160 310 180 310 210 C310 240 290 255 275 272 C260 288 256 302 256 322" 
          fill="none" 
          stroke="url(#gold)" 
          stroke-width="36" 
          stroke-linecap="round" />
    <circle cx="256" cy="372" r="22" fill="url(#gold)" />
  </g>
</svg>