<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#23272f" />
      <stop offset="100%" stop-color="#14161a" />
    </linearGradient>
    <linearGradient id="react-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="90" height="90" x="5" y="5" rx="24" fill="url(#bg-grad)" stroke="#2f3440" stroke-width="1.5" />
  
  <!-- React Logo -->
  <g filter="url(#glow)">
    <ellipse cx="50" cy="50" rx="34" ry="13" fill="none" stroke="url(#react-cyan)" stroke-width="4" transform="rotate(0 50 50)" />
    <ellipse cx="50" cy="50" rx="34" ry="13" fill="none" stroke="url(#react-cyan)" stroke-width="4" transform="rotate(60 50 50)" />
    <ellipse cx="50" cy="50" rx="34" ry="13" fill="none" stroke="url(#react-cyan)" stroke-width="4" transform="rotate(120 50 50)" />
    <circle cx="50" cy="50" r="6.5" fill="url(#react-cyan)" />
  </g>
</svg>